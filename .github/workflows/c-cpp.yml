name: C/C++ CI

on:
  push:
    branches: [ "./github/workflows" ]
  pull_request:
    branches: [ "./github/workflows" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Compile MikoOS CLI
      run: |
        g++ src/main.cpp -o miko -static

    - name: Test Binary
      run: |
        chmod +x miko
        ./miko --help || true

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: miko-binary
        path: miko
